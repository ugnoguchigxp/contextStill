name: verify

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: context_still_test
        options: >-
          --health-cmd "pg_isready -U postgres -d context_still_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/context_still_test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        run: bun run db:migrate
      - name: Verify
        run: bun run verify

  integration:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: ankane/pgvector:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: context_still_test
        options: >-
          --health-cmd "pg_isready -U postgres -d context_still_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/context_still_test
      CONTEXT_STILL_RUN_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        run: bun run db:migrate
      - name: Integration tests
        run: bun run test:integration
