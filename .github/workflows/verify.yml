name: verify

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "23 19 * * *"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Fast verify
        run: bun run verify:fast

  integration:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'schedule'
    services:
      postgres:
        image: ankane/pgvector:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: context_still_test
        options: >-
          --health-cmd "pg_isready -U postgres -d context_still_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/context_still_test
      CONTEXT_STILL_RUN_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        run: bun run db:migrate
      - name: Integration tests
        run: bun run test:integration

  operational-smoke:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: ankane/pgvector:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: context_still_test
        options: >-
          --health-cmd "pg_isready -U postgres -d context_still_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CONTEXT_STILL_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/context_still_test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: MCP smoke
        run: bun run verify:mcp
      - name: Queue smoke
        run: bun run verify:queue:smoke
